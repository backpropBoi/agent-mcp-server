apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name:  {{ .Values.domain }}-mcp-server-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: {{ include "chart.ingressHost" . | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.domain }}-mcp-server
                port:
                  number: {{ .Values.port }}
  tls:
    - secretName: lyra-common
      hosts:
        - {{ include "chart.ingressHost" . | quote }}